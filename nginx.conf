worker_processes  auto;
pid               /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Keep all writable paths under /tmp so the container FS can stay read-only.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  30;
    server_tokens   off;

    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        text/plain text/css application/javascript image/svg+xml application/json;

    server {
        listen       8080;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # Security headers (no inline-blocking CSP issues: the app uses external files).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'" always;

        # Liveness / readiness endpoint for Kubernetes probes.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets; keep HTML uncached so updates roll out instantly.
        location ~* \.(?:css|js|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }
    }
}
